download:
  concurrent_fragments: 1
  continue_dl: true
  format: bv*[height<=720]+ba/b[height<=720]/best[height<=720]/best
  fragment_retries: 2
  ignoreerrors: false
  max_sleep_interval: 2
  max_attempts: 2
  backoff:
    initial_seconds: 2
    max_seconds: 8
    multiplier: 2
    jitter_seconds: 0
  merge_output_format: mkv
  nooverwrites: true
  outtmpl: /tmp/afl_raw/%(id)s/%(title)s [%(id)s].%(ext)s
  restrictfilenames: true
  retries: 2
  sleep_interval: 1
  user_agent: Mozilla/5.0
  platforms:
    youtube:
      cookies: config/youtube_cookies.txt
    bilibili:
      cookies: config/bilibili_cookies.txt
  proxy: http://127.0.0.1:7890
explorer:
  initial_search_terms:
  - category: vlog
    platform: bilibili
    text: vlog
    weight: 1.0
  llm:
    api_key_env: OPENAI_API_KEY
    base_url: https://api.deepseek.com
    enabled: false
    model: deepseek-chat
    optimization_trigger_v1_pass_rate: 0.1
    optimization_trigger_v2_pass_rate: 0.05
  sampling:
    min_weight: 0.1
    target_distribution:
      educational: 0.34
      interview: 0.33
      vlog: 0.33
    weight_decay_factor: 0.9
pipeline:
  auto_cleanup_stale: true
  batch_size: 1
  enable_v2: false
  max_retries: 2
  pending_ratio_threshold: 0.5
  pending_wait_seconds: 5
  target_qualified: 1
project:
  data_dir: /tmp/afl_data_test
  explorer_state: /tmp/afl_explorer_test.json
  logs_dir: /tmp/afl_logs_test
  video_db: /tmp/afl_videos_test.db
search:
  detail_workers: 1
  enabled_platforms:
  - bilibili
  cookie_fallback_on_anti_bot: true
  fast_search:
    extractor_retries: 2
    file_access_retries: 2
    max_sleep_interval: 3
    max_attempts: 2
    timeout_seconds: 30
    backoff:
      initial_seconds: 2
      max_seconds: 8
      multiplier: 2
      jitter_seconds: 0
    sleep_interval_max: 2
    sleep_interval_min: 1
    socket_timeout: 20
  detail_fetch:
    socket_timeout: 30
    timeout_seconds: 45
    max_attempts: 2
    backoff:
      initial_seconds: 2
      max_seconds: 8
      multiplier: 2
      jitter_seconds: 0
  per_platform_results: 2
  platform_cooldown:
    default_seconds: 60
  platforms:
    youtube:
      cookies: config/youtube_cookies.txt
      cooldown_seconds: 60
      fast_search:
        timeout_seconds: 30
      detail_fetch:
        timeout_seconds: 45
    bilibili:
      cookies: config/bilibili_cookies.txt
      cooldown_seconds: 120
      fast_search:
        timeout_seconds: 30
      detail_fetch:
        socket_timeout: 25
        timeout_seconds: 40
  proxy: http://127.0.0.1:7890
v1_filter:
  channel_blacklist:
  - GameGrub
  - 群访
  max_duration: 1800
  min_duration: 10
  min_resolution: 360
  min_views: 0
  tags_whitelist: []
  title_blacklist:
  - reaction
  - multi
  - 多人
  - 合集
  - replay
v2_filter:
  coarse:
    audio_required: false
    batch_size: 4
    model_path: yolo11n.pt
    single_person_threshold: 0.15
  device: cuda
  fine:
    dedup_threshold: 0.99
    face_db_path: /tmp/afl_test_faces.faiss
    head_pose:
      max_angle: 45
      required_ratio: 0.3
    laplacian:
      required_ratio: 0.3
      threshold: 5
    model_name: buffalo_m
    sampling:
      max_frames: 50
      rate: 0.1
    speech_required: false
  pending_limit: 2
  poll_interval_seconds: 1
  claim_lease_seconds: 600
  max_retries: 3
  checkpoint:
    dir: /tmp/afl_checkpoints_test
  qualified_dir: /tmp/afl_qualified_test
