# Integration test config — minimal scope, exercise all pipeline stages
# Data paths use /tmp to avoid polluting the repo
project:
  data_dir: '/tmp/afl_data_test'
  video_db: '/tmp/afl_videos_test.db'
  explorer_state: '/tmp/afl_explorer_test.json'
  logs_dir: '/tmp/afl_logs_test'

search:
  platforms: ['youtube', 'bilibili']
  per_platform_results: 5
  detail_workers: 2
  fast_search:
    socket_timeout: 20
    extractor_retries: 2
    file_access_retries: 2
    sleep_interval_min: 1
    sleep_interval_max: 2
    max_sleep_interval: 3
  detail_fetch:
    socket_timeout: 30

download:
  format: 'bestvideo+bestaudio/best'
  merge_output_format: 'mkv'
  concurrent_fragments: 2
  retries: 2
  fragment_retries: 2
  continue_dl: true
  sleep_interval: 1
  max_sleep_interval: 2
  user_agent: 'Mozilla/5.0'
  outtmpl: '/tmp/afl_raw/%(id)s/%(title)s [%(id)s].%(ext)s'
  nooverwrites: true
  restrictfilenames: true
  ignoreerrors: true

pipeline:
  target_qualified: 1
  batch_size: 5
  max_retries: 2
  pending_ratio_threshold: 0.5
  pending_wait_seconds: 5
  auto_cleanup_stale: true

explorer:
  initial_search_terms:
    - { text: "tutorial", platform: youtube, category: educational, weight: 1.0 }
    - { text: "vlog", platform: youtube, category: vlog, weight: 1.0 }
    - { text: "科普讲解", platform: bilibili, category: educational, weight: 1.0 }
  llm:
    enabled: false
    model: "deepseek-chat"
    api_key_env: "OPENAI_API_KEY"
    base_url: "https://api.deepseek.com"
    optimization_trigger_v2_pass_rate: 0.05
    optimization_trigger_v1_pass_rate: 0.10
  sampling:
    target_distribution:
      interview: 0.33
      educational: 0.34
      vlog: 0.33
    min_weight: 0.1
    weight_decay_factor: 0.9

v1_filter:
  min_duration: 10
  max_duration: 1800
  min_resolution: 360
  title_blacklist: ["reaction", "multi", "多人", "合集", "replay"]
  channel_blacklist: ["GameGrub", "群访"]
  min_views: 0
  tags_whitelist: []

v2_filter:
  device: 'cpu'
  qualified_dir: '/tmp/afl_qualified_test'
  pending_limit: 2
  poll_interval_seconds: 1
  coarse:
    single_person_threshold: 0.15
    audio_required: false
    model_path: 'yolo11n.pt'
    batch_size: 4
  fine:
    model_name: 'buffalo_m'
    face_db_path: '/tmp/afl_test_faces.faiss'
    dedup_threshold: 0.99
    speech_required: false
    head_pose:
      max_angle: 45
      required_ratio: 0.3
    laplacian:
      threshold: 5
      required_ratio: 0.3
    sampling:
      rate: 0.1
      max_frames: 50
    ranking:
      weight_duration: 0.45
      weight_clarity: 0.35
      weight_pose: 0.20
      target_clip_duration: 10.0
